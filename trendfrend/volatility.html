<!doctype html><html lang="ru"><head><meta charset="utf-8"/><title>Волатильность baseline</title><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><style>
body{background:#0b0d14;color:#e6e8f3;font-family:ui-monospace,Consolas,monospace;margin:0;padding:18px}
.wrap{max-width:960px;margin:0 auto}
.card{background:#12141d;border:1px solid #232630;border-radius:12px;padding:14px 16px;margin:12px 0}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.badge{background:#1f2130;border:1px solid #2a2d3a;padding:6px 10px;border-radius:8px;min-width:96px;text-align:center}
.big{font-size:28px;font-weight:700;letter-spacing:0.02em}
.meter{height:10px;background:#1f2130;border-radius:999px;overflow:hidden;flex:1 1 180px;border:1px solid #2a2d3a}
.fill{height:100%;background:linear-gradient(90deg,#4ade80,#facc15,#f97316,#ef4444);width:0%;transition:width .5s ease}
.meta{color:#9ca3af;font-size:12px}
h1{font-size:18px;margin:0 0 6px}
.sub{color:#9ca3af;font-size:12px;margin:0}
table{border-collapse:collapse;width:100%}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #232630;color:#e6e8f3}
.footer{color:#6b7280;font-size:11px;margin-top:8px}
.up{color:#4ade80}.down{color:#ef4444}.warn{color:#facc15}
</style></head><body><div class="wrap">
<h1>ATR% индикатор</h1>
<p class="sub">Источник: ccxt Bybit swap. Базовый порог стратегии: 0.35%. Обновление: при скачивании страницы.</p>

<div id="cards" class="card">
  <div class="row">
    <div><div class="meta">Загрузка …</div></div>
  </div>
</div>

<div class="card">
  <div class="row" style="align-items:flex-end">
    <div><div class="meta">Последние точки</div></div>
    <div class="badge"><div class="meta">3m / 1h</div></div>
  </div>
  <canvas id="spark" height="120" style="width:100%;margin-top:10px"></canvas>
  <div class="footer">min/avg/max за сессию</div>
</div>

<script>
const SYMS = [['SOLUSDT','#22d3ee'],['NEARUSDT','#a78bfa']];
const TF = [['3m','#e6e8f3'],['1h','#9ca3af']];
const THRESHOLD = 0.35;

async function load(){
  const r = await fetch('/volatility-data.json');
  if(!r.ok){document.getElementById('cards').innerHTML='<div class=\"meta\">Нет данных. Запустите volatility_monitor.py</div>';return;}
  const j = await r.json();
  const cards = document.getElementById('cards');
  cards.innerHTML = '';
  for(const sym of SYMS){
    const v3 = j[sym[0]]?.tf?.['3m'];
    const v1 = j[sym[0]]?.tf?.['1h'];
    const used = v3 ?? v1;
    const v = used ?? 0;
    const pct = Math.min(100, Math.max(0, v / 1.0 * 100));
    const cls = v >= THRESHOLD ? 'warn' : (v > 0 ? 'up' : 'down');
    const row = document.createElement('div');
    row.className='row';
    row.style.marginTop='8px';
    row.innerHTML=`<div style="font-weight:700;color:${sym[1]}">${sym[0]}</div>
      <div class="badge"><div class="meta">3m</div><div class="big">${v3!=null?(v3.toFixed(2)+'%'):'—'}</div></div>
      <div class="badge"><div class="meta">1h</div><div class="big">${v1!=null?(v1.toFixed(2)+'%'):'—'}</div></div>
      <div class="badge"><div class="meta">min</div><div class="big ${cls}">${v.toFixed(2)}%</div></div>
      <div class="meter"><div class="fill" style="width:${pct.toFixed(1)}%"></div></div>`;
    cards.appendChild(row);
  }
}
load(); setInterval(load, 30000);
</script>
</div></body></html>
